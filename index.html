<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productivity Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1113;
  --bg2: #15181c;
  --bg3: #1b1f24;
  --bg4: #23272e;
  --border: #2c3138;
  --text: #e6e6e6;
  --text2: #9aa0a6;
  --text3: #6b7280;
  --accent: #8b949e;
  --font: 'DM Sans', sans-serif;
  --mono: 'Space Mono', monospace;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
}

.app{
  display:grid;
  grid-template-columns:220px 1fr;
  grid-template-rows:56px 1fr;
  min-height:100vh;
}

.topbar{
  grid-column:1/-1;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

.vault-logo{
  font-weight:600;
  font-size:15px;
}

.sidebar{
  background:var(--bg2);
  border-right:1px solid var(--border);
  padding:20px 10px;
}

.sidebar-item{
  padding:8px;
  border-radius:6px;
  color:var(--text2);
  cursor:pointer;
}

.sidebar-item:hover{
  background:var(--bg3);
  color:var(--text);
}

.main{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
}

.todo-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  border-radius:6px;
  background:var(--bg4);
  border:1px solid var(--border);
  cursor:pointer;
}

.todo-item.checked{
  opacity:.5;
  text-decoration:line-through;
}

.todo-checkbox{
  width:16px;height:16px;
  border:1px solid var(--text3);
}

.todo-item.checked .todo-checkbox{
  background:var(--accent);
}

.progress-bar-bg{
  height:4px;
  background:var(--border);
  border-radius:10px;
}

.progress-bar-fill{
  height:100%;
  background:var(--accent);
}

.quote-card{
  background:var(--bg3);
  border:1px solid var(--border);
  padding:16px;
  border-radius:10px;
}

button{
  background:none;
  border:1px solid var(--border);
  color:var(--text2);
  padding:4px 10px;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:var(--bg4);
  color:var(--text);
}
</style>
</head>
<body>

<div class="app">

<header class="topbar">
  <div class="vault-logo">Productivity Vault</div>
  <div id="clock"></div>
</header>

<aside class="sidebar">
  <div class="sidebar-item">Dashboard</div>
  <div class="sidebar-item">Tasks</div>
</aside>

<main class="main">

<div class="card">
  <h3>Daily Tasks</h3>
  <div class="todo-item" onclick="toggle(this)">
    <div class="todo-checkbox"></div>
    <span>Complete important work</span>
  </div>
</div>

<div class="quote-card">
  <div id="quoteText"></div>
</div>

</main>
</div>

<script>
function toggle(el){
  el.classList.toggle('checked');
}

function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
